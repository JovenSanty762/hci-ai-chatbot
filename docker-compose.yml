version: '3.9'

services:
  db:
    image: mysql:8.0
    container_name: hci_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: hospital2026
      MYSQL_DATABASE: hci_chatbot
      MYSQL_USER: chatbot_user
      MYSQL_PASSWORD: chatbot2026
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql_data:/var/lib/mysql
    networks:
      - internal
    ports:
      - "3307:3306"   # Puerto externo para poder conectarte desde tu máquina si quieres

  backend:
    build: ./backend
    container_name: hci_backend
    restart: always
    depends_on:
      - db
    environment:
      DATABASE_URL: mysql+pymysql://chatbot_user:chatbot2026@db:3306/hci_chatbot
      OLLAMA_URL: http://ollama:11434
      LLM_MODEL: llama3
    networks:
      - internal
    ports:
      - "8000:8000"   # Para probar el backend directamente

  frontend:
    build: ./frontend
    container_name: hci_frontend
    restart: always
    depends_on:
      - backend
    networks:
      - internal

  nginx:
    image: nginx:alpine
    container_name: hci_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
    networks:
      - internal

  ollama:
    image: ollama/ollama
    container_name: hci_ollama
    restart: always
    volumes:
      - ollama_data:/root/.ollama
    # command: serve   # Se comenta porque ollama/ollama ya lo maneja
    networks:
      - internal
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  mysql_data:
  ollama_data:

networks:
  internal:
    driver: bridge

version: '3.9'

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: hospital2026
      MYSQL_DATABASE: hci_chatbot
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - internal

  ollama:
    image: ollama/ollama
    volumes:
      - ollama:/root/.ollama
    command: serve
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - internal

  backend:
    build: ./backend
    depends_on:
      - mysql
      - ollama
    environment:
      - OLLAMA_URL=http://ollama:11434
      - LLM_MODEL=llama3
    networks:
      - internal

  frontend:
    build: ./frontend
    depends_on:
      - backend
    networks:
      - internal

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
    networks:
      - internal

networks:
  internal:
    driver: bridge

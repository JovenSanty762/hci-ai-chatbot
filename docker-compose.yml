services:
  mysql:
    image: mysql:8.0
    container_name: hospital_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: hospital2026
      MYSQL_DATABASE: hci_chatbot
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p hospital2026"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: hospital_ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - internal
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "sh", "-c", "ollama list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  backend:
    build: ./backend
    container_name: hospital_backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      MYSQL_USER: root
      MYSQL_PASSWORD: hospital2026
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: hci_chatbot

      OLLAMA_URL: http://ollama:11434/api/generate
      OLLAMA_MODEL: llama3
    networks:
      - internal
    volumes:
      - ./backend/logs:/app/logs

  frontend:
    build: ./frontend
    container_name: hospital_frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - internal

  nginx:
    image: nginx:alpine
    container_name: hospital_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  mysql_data:
  ollama_data:
